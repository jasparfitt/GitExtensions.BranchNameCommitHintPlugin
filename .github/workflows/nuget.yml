name: Nuget Package

on:
  push:
    tags: "*"
  workflow_dispatch:

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: GitExtensions.BranchNameCommitHintPlugin.sln
      Project_Directory: src\GitExtensions.BranchNameCommitHintPlugin

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore the application
      run: |
        dotnet build $env:Solution_Name /p:Configuration=$env:Configuration
        dotnet nuget push ${{ env.Project_Directory }}\bin\release\*.nupkg --source https://api.nuget.org/v3/index.json
      env:
        Configuration: ${{ matrix.configuration }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: NugetPackage
        path: ${{ env.Project_Directory }}\bin\release\*.nupkg
