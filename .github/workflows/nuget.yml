# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Nuget Package

on:
  push:
    tags: "*"
  workflow_dispatch:

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: GitExtensions.BranchNameCommitHintPlugin.sln         # Replace with your solution name, i.e. MyWpfApp.sln.
      Project_Directory: src\GitExtensions.BranchNameCommitHintPlugin     # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore the application
      run: dotnet build $env:Solution_Name /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Upload the MSIX package: https://github.com/marketplace/actions/upload-a-build-artifact
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: MSIX Package
        path: ${{ env.Project_Directory }}\bin\release\*.nupkg
